<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>kepap – Medienverwaltung</title>
<style>
/* ── Reset & Base ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f1a;--bg2:#161625;--surface:#1c1c2e;--surface2:#252540;
  --border:#2a2a45;--border-glow:rgba(99,102,241,.15);
  --text:#e8e8f0;--text2:#9898b0;--text3:#5e5e7a;
  --accent:#6366f1;--accent2:#818cf8;--accent-light:rgba(99,102,241,.1);--accent-glow:rgba(99,102,241,.25);
  --gradient:linear-gradient(135deg,#6366f1,#a855f7,#ec4899);
  --gradient2:linear-gradient(135deg,#6366f1 0%,#818cf8 100%);
  --radius:12px;--radius-lg:16px;
  --shadow:0 4px 24px rgba(0,0,0,.3);--shadow-lg:0 8px 40px rgba(0,0,0,.4);
  --topbar-h:60px;--sidebar-w:290px;
  --badge-video:#1e3a5f;--badge-video-t:#60a5fa;
  --badge-image:#3b2f1a;--badge-image-t:#fbbf24;
  --badge-audio:#2d1f4e;--badge-audio-t:#a78bfa;
  --badge-text:#1a3329;--badge-text-t:#34d399;
  --glass:rgba(28,28,46,.7);--glass-border:rgba(255,255,255,.06);
}
html{font-size:14px;scroll-behavior:smooth}
body{font-family:'Inter','Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;overflow-x:hidden;min-height:100vh}
body::before{content:'';position:fixed;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle at 20% 20%,rgba(99,102,241,.06) 0%,transparent 50%),radial-gradient(circle at 80% 80%,rgba(168,85,247,.04) 0%,transparent 50%),radial-gradient(circle at 50% 50%,rgba(236,72,153,.03) 0%,transparent 50%);z-index:-1;animation:bgShift 20s ease-in-out infinite alternate}
@keyframes bgShift{0%{transform:translate(0,0)}100%{transform:translate(-5%,-3%)}}
button{font:inherit;cursor:pointer;border:none;background:none;color:inherit}
input{font:inherit;color:var(--text)}
a{color:var(--accent2);text-decoration:none;transition:color .2s}
a:hover{color:#a78bfa}

/* ── Topbar ── */
.topbar{position:fixed;top:0;left:0;right:0;height:var(--topbar-h);background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--glass-border);display:flex;align-items:center;padding:0 20px;z-index:100;gap:14px;animation:slideDown .5s ease}
@keyframes slideDown{from{transform:translateY(-100%);opacity:0}to{transform:translateY(0);opacity:1}}
.topbar-burger{width:40px;height:40px;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:5px;border-radius:var(--radius);transition:all .25s}
.topbar-burger:hover{background:var(--accent-light);transform:scale(1.05)}
.topbar-burger span{display:block;width:18px;height:2px;background:var(--text);border-radius:2px;transition:all .3s}
.topbar-burger:hover span{background:var(--accent2)}
.topbar-logo{font-weight:800;font-size:1.3rem;letter-spacing:-.5px;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.topbar-spacer{flex:1}
.topbar-filter{font-size:.78rem;color:var(--accent2);background:var(--accent-light);padding:4px 12px;border-radius:20px;white-space:nowrap;max-width:200px;overflow:hidden;text-overflow:ellipsis;border:1px solid var(--accent-glow);animation:fadeIn .3s ease}
.topbar-filter:empty{display:none}

/* ── Sidebar / Overlay ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;opacity:0;pointer-events:none;transition:opacity .3s;backdrop-filter:blur(4px)}
.overlay.open{opacity:1;pointer-events:auto}
.sidebar{position:fixed;top:0;bottom:0;left:0;width:var(--sidebar-w);background:var(--glass);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-right:1px solid var(--glass-border);z-index:201;transform:translateX(-100%);transition:transform .35s cubic-bezier(.4,0,.2,1);overflow-y:auto;padding:20px 0}
.sidebar.open{transform:translateX(0)}
.sidebar h3{font-size:.65rem;text-transform:uppercase;letter-spacing:.12em;color:var(--text3);padding:18px 22px 8px;font-weight:700}
.sidebar h3:first-child{padding-top:14px}
.sb-item{display:flex;align-items:center;padding:9px 22px;cursor:pointer;transition:all .2s;font-size:.9rem;gap:10px;border-left:3px solid transparent;margin:1px 0}
.sb-item:hover{background:var(--accent-light);border-left-color:var(--accent);color:var(--accent2)}
.sb-item.active{background:var(--accent-light);color:var(--accent2);font-weight:600;border-left-color:var(--accent)}
.sb-item .cnt{margin-left:auto;font-size:.7rem;color:var(--text3);background:var(--surface2);padding:2px 8px;border-radius:10px;min-width:24px;text-align:center}
.sb-item.active .cnt{color:var(--accent2);background:var(--accent-glow)}

/* ── Main ── */
.main{margin-top:var(--topbar-h);padding:24px 28px 50px;animation:fadeInUp .6s ease}
@keyframes fadeInUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.toolbar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:16px}
.search-box{flex:1;min-width:180px;max-width:420px;position:relative}
.search-box input{width:100%;padding:10px 14px 10px 38px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface);outline:none;transition:all .3s;color:var(--text)}
.search-box input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
.search-box input::placeholder{color:var(--text3)}
.search-box svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3);transition:color .2s}
.search-box input:focus~svg,.search-box:focus-within svg{color:var(--accent2)}
.view-toggle{display:flex;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.view-toggle button{padding:8px 12px;background:var(--surface);transition:all .25s}
.view-toggle button:not(:last-child){border-right:1px solid var(--border)}
.view-toggle button.active{background:var(--gradient2);color:#fff}
.view-toggle button:hover:not(.active){background:var(--surface2)}
.view-toggle button svg{display:block}
.breadcrumb{font-size:.82rem;color:var(--text2);margin-bottom:18px;padding:8px 14px;background:var(--surface);border-radius:var(--radius);border:1px solid var(--border)}
.breadcrumb strong{color:var(--text);font-weight:700}

/* ── Grid View ── */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:16px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;cursor:pointer;transition:all .35s cubic-bezier(.4,0,.2,1);opacity:0;animation:cardIn .5s ease forwards;position:relative}
.card::before{content:'';position:absolute;inset:0;border-radius:var(--radius-lg);background:var(--gradient);opacity:0;transition:opacity .35s;z-index:0;pointer-events:none}
.card:hover{transform:translateY(-6px) scale(1.02);box-shadow:0 12px 40px rgba(99,102,241,.2);border-color:var(--accent-glow)}
.card:hover::before{opacity:.05}
@keyframes cardIn{from{opacity:0;transform:translateY(24px) scale(.95)}to{opacity:1;transform:translateY(0) scale(1)}}
.card:nth-child(1){animation-delay:.02s}.card:nth-child(2){animation-delay:.06s}.card:nth-child(3){animation-delay:.1s}
.card:nth-child(4){animation-delay:.14s}.card:nth-child(5){animation-delay:.18s}.card:nth-child(6){animation-delay:.22s}
.card:nth-child(7){animation-delay:.26s}.card:nth-child(8){animation-delay:.3s}.card:nth-child(9){animation-delay:.34s}
.card:nth-child(10){animation-delay:.38s}.card:nth-child(11){animation-delay:.42s}.card:nth-child(12){animation-delay:.46s}
.card-preview{height:150px;background:var(--bg2);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.card-preview img{width:100%;height:100%;object-fit:cover;transition:transform .5s cubic-bezier(.4,0,.2,1)}
.card:hover .card-preview img{transform:scale(1.08)}
.card-preview .icon-placeholder{font-size:2.8rem;color:var(--text3);transition:transform .3s,color .3s}
.card:hover .card-preview .icon-placeholder{transform:scale(1.15);color:var(--accent2)}
.card-badge{position:absolute;top:10px;right:10px;font-size:.62rem;font-weight:700;padding:3px 10px;border-radius:12px;text-transform:uppercase;letter-spacing:.05em;backdrop-filter:blur(8px);z-index:1}
.badge-video{background:var(--badge-video);color:var(--badge-video-t);border:1px solid rgba(96,165,250,.2)}
.badge-image{background:var(--badge-image);color:var(--badge-image-t);border:1px solid rgba(251,191,36,.2)}
.badge-audio{background:var(--badge-audio);color:var(--badge-audio-t);border:1px solid rgba(167,139,250,.2)}
.badge-text{background:var(--badge-text);color:var(--badge-text-t);border:1px solid rgba(52,211,153,.2)}
.card-body{padding:12px 14px;position:relative;z-index:1}
.card-name{font-size:.88rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-meta{font-size:.75rem;color:var(--text2);margin-top:4px;display:flex;justify-content:space-between}

/* ── List View ── */
.list-table{width:100%;border-collapse:separate;border-spacing:0 4px;font-size:.88rem}
.list-table th{text-align:left;font-weight:700;font-size:.72rem;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);padding:10px 14px}
.list-table td{padding:12px 14px;vertical-align:middle;background:var(--surface);transition:all .2s}
.list-table tr td:first-child{border-radius:var(--radius) 0 0 var(--radius)}
.list-table tr td:last-child{border-radius:0 var(--radius) var(--radius) 0}
.list-table tbody tr{cursor:pointer}
.list-table tbody tr:hover td{background:var(--surface2);transform:none}
.list-table tbody tr{animation:fadeInUp .4s ease backwards}
.list-table tbody tr:nth-child(1){animation-delay:.02s}.list-table tbody tr:nth-child(2){animation-delay:.04s}
.list-table tbody tr:nth-child(3){animation-delay:.06s}.list-table tbody tr:nth-child(4){animation-delay:.08s}
.list-table tbody tr:nth-child(5){animation-delay:.1s}
.list-table .type-badge{display:inline-block;font-size:.62rem;font-weight:700;padding:3px 9px;border-radius:10px;text-transform:uppercase}
.fname{max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ── Modal ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:300;display:none;align-items:center;justify-content:center;padding:24px;backdrop-filter:blur(8px)}
.modal-overlay.open{display:flex;animation:fadeIn .25s ease}
.modal{background:var(--surface);border-radius:var(--radius-lg);max-width:820px;width:100%;max-height:90vh;overflow:auto;box-shadow:0 24px 80px rgba(0,0,0,.5);position:relative;border:1px solid var(--glass-border);animation:modalIn .35s cubic-bezier(.4,0,.2,1)}
@keyframes modalIn{from{opacity:0;transform:scale(.92) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}
.modal-close{position:absolute;top:14px;right:14px;width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;z-index:2;transition:all .25s;border:1px solid var(--glass-border);color:var(--text)}
.modal-close:hover{background:rgba(255,255,255,.12);transform:rotate(90deg) scale(1.1)}
.modal-preview{background:var(--bg);display:flex;align-items:center;justify-content:center;min-height:200px;max-height:55vh;overflow:hidden;border-radius:var(--radius-lg) var(--radius-lg) 0 0}
.modal-preview img{max-width:100%;max-height:55vh;object-fit:contain;animation:fadeIn .4s ease}
.modal-preview video,.modal-preview audio{max-width:100%;outline:none}
.modal-preview pre{color:var(--text2);padding:24px;font-size:.85rem;max-height:55vh;overflow:auto;width:100%;white-space:pre-wrap;word-break:break-word}
.modal-info{padding:22px 26px}
.modal-info h2{font-size:1.15rem;margin-bottom:8px;font-weight:700}
.modal-info .meta-row{font-size:.82rem;color:var(--text2);display:flex;gap:16px;flex-wrap:wrap;margin-bottom:6px}
.modal-info .meta-row span{display:flex;align-items:center;gap:4px}
.modal-info .meta-row strong{color:var(--text)}

/* ── Loading / Empty ── */
.state-msg{text-align:center;padding:80px 20px;color:var(--text3);animation:fadeInUp .5s ease}
.state-msg .icon{font-size:3rem;margin-bottom:12px;filter:grayscale(.3)}
.state-msg p{font-size:.95rem}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Repo Input Bar ── */
.repo-bar{display:flex;gap:10px;margin-bottom:20px;align-items:center;flex-wrap:wrap;padding:16px 18px;background:var(--surface);border-radius:var(--radius-lg);border:1px solid var(--border)}
.repo-bar input{flex:1;min-width:200px;padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg2);outline:none;transition:all .3s;color:var(--text)}
.repo-bar input::placeholder{color:var(--text3)}
.repo-bar input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
.repo-bar button{padding:10px 22px;background:var(--gradient2);color:#fff;border-radius:var(--radius);font-weight:700;font-size:.88rem;transition:all .25s;border:none}
.repo-bar button:hover{opacity:.9;transform:translateY(-1px);box-shadow:0 4px 16px var(--accent-glow)}
.repo-bar button:active{transform:translateY(0)}
.repo-bar .status{font-size:.78rem;color:var(--text2)}
.repo-bar .status.err{color:#f87171}

/* ── Upload Button Style ── */
.upload-btn{padding:10px 18px!important;background:var(--gradient)!important;color:#fff!important;border-radius:var(--radius)!important;font-weight:700!important;font-size:.88rem!important;transition:all .25s!important;white-space:nowrap!important;border:none!important}
.upload-btn:hover{opacity:.9!important;transform:translateY(-1px)!important;box-shadow:0 4px 16px rgba(168,85,247,.3)!important}

/* ── Upload Modal ── */
#uploadOverlay .modal{background:var(--surface);border:1px solid var(--glass-border)}
#uploadOverlay input,#uploadOverlay select{background:var(--bg2)!important;color:var(--text)!important;border-color:var(--border)!important}
#uploadOverlay input:focus,#uploadOverlay select:focus{border-color:var(--accent)!important;box-shadow:0 0 0 3px var(--accent-glow)}
#uploadOverlay label{color:var(--text2)!important}
#uploadOverlay h2{color:var(--text)!important}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:8px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:var(--text3)}

/* ── Responsive ── */
@media(max-width:600px){
  .grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px}
  .card-preview{height:120px}
  .main{padding:16px 12px 30px}
  .toolbar{gap:8px}
  .repo-bar{padding:12px 14px}
}
</style>
</head>
<body>

<!-- ── Topbar ── -->
<header class="topbar">
  <button class="topbar-burger" id="burgerBtn" aria-label="Menü öffnen">
    <span></span><span></span><span></span>
  </button>
  <div class="topbar-logo"><em>ke</em>pap</div>
  <div class="topbar-spacer"></div>
  <div class="topbar-filter" id="topFilter"></div>
</header>

<!-- ── Sidebar ── -->
<div class="overlay" id="overlay"></div>
<nav class="sidebar" id="sidebar">
  <h3>Typ</h3>
  <div id="sbTypes"></div>
  <h3>Klassen</h3>
  <div id="sbKlassen"></div>
</nav>

<!-- ── Main ── -->
<main class="main">
  <div class="repo-bar">
    <input type="text" id="repoInput" placeholder="GitHub-Repo-URL  z. B. https://github.com/Kralix1694/Kepap.git" value="https://github.com/Kralix1694/Kepap.git">
    <button id="loadBtn">Laden</button>
    <span class="status" id="repoStatus"></span>
  </div>

  <div class="toolbar">
    <div class="search-box">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/></svg>
      <input type="text" id="searchInput" placeholder="Suche nach Dateiname oder Kategorie…">
    </div>
    <div class="view-toggle">
      <button id="gridBtn" class="active" title="Rasteransicht">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      </button>
      <button id="listBtn" title="Listenansicht">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="4" width="18" height="2" rx="1"/><rect x="3" y="11" width="18" height="2" rx="1"/><rect x="3" y="18" width="18" height="2" rx="1"/></svg>
      </button>
    </div>
  </div>

  <div class="breadcrumb" id="breadcrumb"></div>
  <div id="content"></div>
</main>

<!-- ── Modal ── -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <button class="modal-close" id="modalClose">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg>
    </button>
    <div class="modal-preview" id="modalPreview"></div>
    <div class="modal-info" id="modalInfo"></div>
  </div>
</div>

<!-- ── Upload Modal ── -->
<div class="modal-overlay" id="uploadOverlay">
  <div class="modal" style="max-width:500px">
    <button class="modal-close" onclick="closeUploadModal()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg>
    </button>
    <div style="padding:24px">
      <h2 style="margin-bottom:16px">Datei hochladen</h2>
      <label style="font-size:.85rem;font-weight:600;display:block;margin-bottom:4px">GitHub Token</label>
      <input type="password" id="uploadToken" placeholder="ghp_..." style="width:100%;padding:7px 12px;border:1px solid var(--border);border-radius:var(--radius);margin-bottom:12px">
      <label style="font-size:.85rem;font-weight:600;display:block;margin-bottom:4px">Branch</label>
      <input type="text" id="uploadBranch" value="main" style="width:100%;padding:7px 12px;border:1px solid var(--border);border-radius:var(--radius);margin-bottom:12px">
      <label style="font-size:.85rem;font-weight:600;display:block;margin-bottom:4px">Kategorie</label>
      <select id="uploadKat" style="width:100%;padding:7px 12px;border:1px solid var(--border);border-radius:var(--radius);margin-bottom:12px;background:var(--surface)"></select>
      <label style="font-size:.85rem;font-weight:600;display:block;margin-bottom:4px">Dateien</label>
      <input type="file" id="uploadFiles" multiple style="margin-bottom:16px">
      <div style="display:flex;gap:8px;align-items:center">
        <button onclick="uploadFiles()" style="padding:10px 22px;background:linear-gradient(135deg,#6366f1,#818cf8);color:#fff;border-radius:12px;font-weight:700;transition:all .25s;border:none" onmouseover="this.style.opacity='.9';this.style.transform='translateY(-1px)'" onmouseout="this.style.opacity='1';this.style.transform='none'">Hochladen</button>
        <span class="status" id="uploadStatus"></span>
      </div>
    </div>
  </div>
</div>

<script>
/* ================================================================
   kepap – Medienverwaltung  (Client-Side, GitHub-backed)
   ================================================================ */

// ── Kategorien ──
const KATEGORIEN = [
  'IFZK-2524-017-ABU',
  'IFZK-2524-017-S2-UEK-106',
  'IFZK-2524-017-S2-MAT',
  'IFZK-2524-017-S2-254',
  'IFZK-2524-017-S2-241',
  'IFZK-2524-017-S2-346',
  'IFZK-2524-017-S2-306',
  'IFZK-2524-017-S2-245',
  'IFZK-2524-017-S2-319',
  'IFZK-2524-017-S1-ENG-N3',
  'IFZK-2524-017-S1-114',
  'IFZK-2524-017-S1-OFF',
  'IFZK-2524-017-S1-231',
  'IFZK-2524-017-S1-UEK-187',
  'IFZK-2524-017-S1-431',
  'IFZK-2524-017-S1-162',
  'IFZK-2524-017-S1-164',
  'IFZK-2524-017-S1-122',
  'IFZK-2524-017-S1-117'
];

function displayName(kat) {
  return kat.replace(/^IFZK-2524-017-/, '').replace(/^S[12]-/, '');
}

// ── Dateityp-Erkennung ──
const EXT_MAP = {
  video: ['mp4','mov','webm'],
  image: ['jpg','jpeg','png','gif','webp','svg'],
  audio: ['mp3','wav','ogg','aac'],
  text:  ['txt','md','csv','json']
};
function mediaType(filename) {
  const ext = filename.split('.').pop().toLowerCase();
  for (const [type, exts] of Object.entries(EXT_MAP)) {
    if (exts.includes(ext)) return type;
  }
  return null;
}
const SUPPORTED_EXTS = Object.values(EXT_MAP).flat();

// ── State ──
let allFiles = [];       // {path, name, size, kategorie, type, rawUrl}
let filterType = 'all';  // 'all','video','image','audio','text'
let filterKat = null;    // null = alle, sonst IFZK-String
let viewMode = 'grid';   // 'grid' | 'list'
let repoOwner = '';
let repoName = '';

// ── DOM refs ──
const $ = id => document.getElementById(id);
const burgerBtn   = $('burgerBtn');
const overlay     = $('overlay');
const sidebar     = $('sidebar');
const topFilter   = $('topFilter');
const sbTypes     = $('sbTypes');
const sbKlassen   = $('sbKlassen');
const searchInput = $('searchInput');
const gridBtn     = $('gridBtn');
const listBtn     = $('listBtn');
const breadcrumb  = $('breadcrumb');
const content     = $('content');
const repoInput   = $('repoInput');
const loadBtn     = $('loadBtn');
const repoStatus  = $('repoStatus');
const modalOverlay = $('modalOverlay');
const modalPreview = $('modalPreview');
const modalInfo    = $('modalInfo');
const modalClose   = $('modalClose');

// ── Sidebar toggle ──
function openSidebar()  { sidebar.classList.add('open'); overlay.classList.add('open'); }
function closeSidebar() { sidebar.classList.remove('open'); overlay.classList.remove('open'); }
burgerBtn.addEventListener('click', () => sidebar.classList.contains('open') ? closeSidebar() : openSidebar());
overlay.addEventListener('click', closeSidebar);

// ── View toggle ──
gridBtn.addEventListener('click', () => { viewMode='grid'; gridBtn.classList.add('active'); listBtn.classList.remove('active'); render(); });
listBtn.addEventListener('click', () => { viewMode='list'; listBtn.classList.add('active'); gridBtn.classList.remove('active'); render(); });

// ── Search ──
searchInput.addEventListener('input', () => render());

// ── Modal ──
modalClose.addEventListener('click', closeModal);
modalOverlay.addEventListener('click', e => { if (e.target === modalOverlay) closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
function closeModal() { modalOverlay.classList.remove('open'); modalPreview.innerHTML = ''; modalInfo.innerHTML = ''; }

let currentModalFile = null;
function openModal(file) {
  currentModalFile = file;
  let preview = '';
  if (file.type === 'image') {
    preview = `<img src="${file.rawUrl}" alt="${file.name}" loading="lazy">`;
  } else if (file.type === 'video') {
    preview = `<video src="${file.rawUrl}" controls autoplay></video>`;
  } else if (file.type === 'audio') {
    preview = `<div style="padding:40px;width:100%"><audio src="${file.rawUrl}" controls autoplay style="width:100%"></audio></div>`;
  } else if (file.type === 'text') {
    preview = `<pre id="textPreviewContent">Lade…</pre>`;
    fetch(file.rawUrl).then(r => r.text()).then(t => {
      const el = document.getElementById('textPreviewContent');
      if (el) el.textContent = t.substring(0, 50000);
    }).catch(() => {
      const el = document.getElementById('textPreviewContent');
      if (el) el.textContent = 'Fehler beim Laden.';
    });
  }
  modalPreview.innerHTML = preview;
  modalInfo.innerHTML = `
    <h2>${esc(file.name)}</h2>
    <div class="meta-row">
      <span><strong>Typ:</strong> ${file.type}</span>
      <span><strong>Klasse:</strong> ${file.kategorie ? displayName(file.kategorie) : '—'}</span>
      ${file.size ? `<span><strong>Grösse:</strong> ${fmtSize(file.size)}</span>` : ''}
    </div>
    <div class="meta-row" style="margin-top:6px">
      <span><strong>Pfad:</strong> ${esc(file.path)}</span>
    </div>
    <div style="margin-top:12px;display:flex;gap:12px;align-items:center">
      <a href="${file.rawUrl}" target="_blank" rel="noopener" style="font-size:.85rem">↗ Datei öffnen (raw)</a>
      <button id="deleteBtn" style="font-size:.82rem;color:#f87171;background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.3);padding:5px 14px;border-radius:var(--radius);cursor:pointer;transition:all .2s;font-weight:600" onmouseover="this.style.background='rgba(248,113,113,.2)'" onmouseout="this.style.background='rgba(248,113,113,.1)'">Löschen</button>
    </div>`;
  modalOverlay.classList.add('open');
  document.getElementById('deleteBtn')?.addEventListener('click', () => deleteFile(currentModalFile));
}

// ── Repo laden ──
loadBtn.addEventListener('click', loadRepo);
repoInput.addEventListener('keydown', e => { if (e.key === 'Enter') loadRepo(); });

async function loadRepo() {
  const url = repoInput.value.trim();
  const m = url.match(/github\.com\/([^\/]+)\/([^\/\.\s]+)/);
  if (!m) { repoStatus.textContent = 'Ungültige GitHub-URL'; repoStatus.classList.add('err'); return; }
  repoOwner = m[1]; repoName = m[2];
  repoStatus.classList.remove('err');
  repoStatus.textContent = 'Lade Dateibaum…';
  loadBtn.disabled = true;

  content.innerHTML = '<div class="state-msg"><div class="spinner"></div><p>Dateibaum wird geladen…</p></div>';

  try {
    const apiUrl = `https://api.github.com/repos/${repoOwner}/${repoName}/git/trees/HEAD?recursive=1`;
    const res = await fetch(apiUrl);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    if (!data.tree) throw new Error('Kein Dateibaum erhalten');

    allFiles = [];
    for (const node of data.tree) {
      if (node.type !== 'blob') continue;
      const name = node.path.split('/').pop();
      const ext = name.split('.').pop().toLowerCase();
      if (!SUPPORTED_EXTS.includes(ext)) continue;

      // Kategorie aus dem ersten Ordnernamen
      const parts = node.path.split('/');
      let kategorie = null;
      for (const p of parts.slice(0, -1)) {
        if (KATEGORIEN.includes(p)) { kategorie = p; break; }
      }

      const type = mediaType(name);
      allFiles.push({
        path: node.path,
        name: name,
        size: node.size || 0,
        kategorie: kategorie,
        type: type,
        rawUrl: `https://raw.githubusercontent.com/${repoOwner}/${repoName}/HEAD/${encodeURIComponent(node.path).replace(/%2F/g, '/')}`
      });
    }

    repoStatus.textContent = `${allFiles.length} Dateien gefunden`;
    buildSidebar();
    render();
  } catch (err) {
    repoStatus.textContent = 'Fehler: ' + err.message;
    repoStatus.classList.add('err');
    content.innerHTML = `<div class="state-msg"><div class="icon">⚠</div><p>${esc(err.message)}</p></div>`;
  } finally {
    loadBtn.disabled = false;
  }
}

// ── Sidebar aufbauen ──
function buildSidebar() {
  const counts = { all:0, video:0, image:0, audio:0, text:0 };
  const katCounts = {};
  KATEGORIEN.forEach(k => katCounts[k] = 0);

  for (const f of allFiles) {
    counts.all++;
    if (counts[f.type] !== undefined) counts[f.type]++;
    if (f.kategorie && katCounts[f.kategorie] !== undefined) katCounts[f.kategorie]++;
  }

  const typeLabels = { all:'Alle', video:'Videos', image:'Bilder', audio:'Audio', text:'Texte' };
  sbTypes.innerHTML = '';
  for (const [key, label] of Object.entries(typeLabels)) {
    const el = document.createElement('div');
    el.className = 'sb-item' + (filterType === key && !filterKat ? ' active' : '');
    el.innerHTML = `${label}<span class="cnt">${counts[key]}</span>`;
    el.addEventListener('click', () => { filterType = key; filterKat = null; closeSidebar(); buildSidebar(); render(); });
    sbTypes.appendChild(el);
  }

  sbKlassen.innerHTML = '';
  for (const kat of KATEGORIEN) {
    const el = document.createElement('div');
    el.className = 'sb-item' + (filterKat === kat ? ' active' : '');
    el.innerHTML = `${displayName(kat)}<span class="cnt">${katCounts[kat]}</span>`;
    el.addEventListener('click', () => { filterKat = kat; filterType = 'all'; closeSidebar(); buildSidebar(); render(); });
    sbKlassen.appendChild(el);
  }
}

// ── Filtern ──
function getFiltered() {
  const q = searchInput.value.trim().toLowerCase();
  return allFiles.filter(f => {
    if (filterType !== 'all' && f.type !== filterType) return false;
    if (filterKat && f.kategorie !== filterKat) return false;
    if (q) {
      const haystack = (f.name + ' ' + (f.kategorie || '')).toLowerCase();
      if (!haystack.includes(q)) return false;
    }
    return true;
  });
}

// ── Rendern ──
function render() {
  const filtered = getFiltered();

  // Topbar-Filter-Anzeige
  let filterLabel = '';
  if (filterKat) filterLabel = displayName(filterKat);
  else if (filterType !== 'all') filterLabel = { video:'Videos', image:'Bilder', audio:'Audio', text:'Texte' }[filterType];
  topFilter.textContent = filterLabel;

  // Breadcrumb
  breadcrumb.innerHTML = `<strong>kepap</strong>${filterLabel ? ' › ' + filterLabel : ''}${searchInput.value.trim() ? ' › «' + esc(searchInput.value.trim()) + '»' : ''} — ${filtered.length} Ergebnis${filtered.length !== 1 ? 'se' : ''}`;

  if (filtered.length === 0) {
    content.innerHTML = '<div class="state-msg"><div class="icon">📂</div><p>Keine Dateien gefunden.</p></div>';
    return;
  }

  if (viewMode === 'grid') renderGrid(filtered);
  else renderList(filtered);
}

function renderGrid(files) {
  let html = '<div class="grid">';
  for (const f of files) {
    const badgeClass = 'badge-' + f.type;
    const badgeLabel = f.type === 'image' ? 'Bild' : f.type === 'video' ? 'Video' : f.type === 'audio' ? 'Audio' : 'Text';
    let previewInner;
    if (f.type === 'image') {
      previewInner = `<img src="${f.rawUrl}" alt="${esc(f.name)}" loading="lazy">`;
    } else {
      const icons = { video:'▶', audio:'♫', text:'📄' };
      previewInner = `<span class="icon-placeholder">${icons[f.type] || '?'}</span>`;
    }
    html += `
      <div class="card" data-path="${esc(f.path)}">
        <div class="card-preview">
          ${previewInner}
          <span class="card-badge ${badgeClass}">${badgeLabel}</span>
        </div>
        <div class="card-body">
          <div class="card-name" title="${esc(f.name)}">${esc(f.name)}</div>
          <div class="card-meta">
            <span>${f.kategorie ? displayName(f.kategorie) : '—'}</span>
            <span>${fmtSize(f.size)}</span>
          </div>
        </div>
      </div>`;
  }
  html += '</div>';
  content.innerHTML = html;
  content.querySelectorAll('.card').forEach(card => {
    card.addEventListener('click', () => {
      const file = files.find(f => f.path === card.dataset.path);
      if (file) openModal(file);
    });
  });
}

function renderList(files) {
  let html = `<table class="list-table"><thead><tr>
    <th>Typ</th><th>Dateiname</th><th>Klasse</th><th>Grösse</th>
  </tr></thead><tbody>`;
  for (const f of files) {
    const badgeClass = 'badge-' + f.type;
    const badgeLabel = f.type === 'image' ? 'Bild' : f.type === 'video' ? 'Video' : f.type === 'audio' ? 'Audio' : 'Text';
    html += `<tr data-path="${esc(f.path)}">
      <td><span class="type-badge ${badgeClass}">${badgeLabel}</span></td>
      <td class="fname" title="${esc(f.name)}">${esc(f.name)}</td>
      <td>${f.kategorie ? displayName(f.kategorie) : '—'}</td>
      <td>${fmtSize(f.size)}</td>
    </tr>`;
  }
  html += '</tbody></table>';
  content.innerHTML = html;
  content.querySelectorAll('tbody tr').forEach(row => {
    row.addEventListener('click', () => {
      const file = files.find(f => f.path === row.dataset.path);
      if (file) openModal(file);
    });
  });
}

// ── Hilfsfunktionen ──
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function fmtSize(bytes) {
  if (!bytes) return '—';
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / 1048576).toFixed(1) + ' MB';
}

// ── Upload-Funktion (GitHub API) ──
let ghToken = localStorage.getItem('kepap_gh_token') || '';

function showUploadModal() {
  if (!repoOwner || !repoName) { alert('Bitte zuerst ein Repository laden.'); return; }
  const overlay = document.getElementById('uploadOverlay');
  overlay.classList.add('open');
  document.getElementById('uploadKat').innerHTML = KATEGORIEN.map(k => `<option value="${k}">${displayName(k)}</option>`).join('');
  document.getElementById('uploadToken').value = ghToken;
  document.getElementById('uploadStatus').textContent = '';
  document.getElementById('uploadFiles').value = '';
}

function closeUploadModal() {
  document.getElementById('uploadOverlay').classList.remove('open');
}

async function uploadFiles() {
  const token = document.getElementById('uploadToken').value.trim();
  const kat = document.getElementById('uploadKat').value;
  const files = document.getElementById('uploadFiles').files;
  const status = document.getElementById('uploadStatus');
  const branch = document.getElementById('uploadBranch').value.trim() || 'main';

  if (!token) { status.textContent = 'Bitte GitHub Token eingeben.'; status.className = 'status err'; return; }
  if (!files.length) { status.textContent = 'Bitte Dateien auswählen.'; status.className = 'status err'; return; }

  ghToken = token;
  localStorage.setItem('kepap_gh_token', token);

  status.textContent = `Lade ${files.length} Datei(en) hoch…`;
  status.className = 'status';

  let success = 0;
  for (const file of files) {
    const path = `Downloads/Kepap-main/${kat}/${file.name}`;
    try {
      const arrayBuf = await file.arrayBuffer();
      const base64 = btoa(String.fromCharCode(...new Uint8Array(arrayBuf)));
      const res = await fetch(`https://api.github.com/repos/${repoOwner}/${repoName}/contents/${path}`, {
        method: 'PUT',
        headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: `Datei hinzufügen: ${file.name} → ${displayName(kat)}`, content: base64, branch: branch })
      });
      if (!res.ok) { const err = await res.json(); throw new Error(err.message || `HTTP ${res.status}`); }
      success++;
      status.textContent = `${success}/${files.length} hochgeladen…`;
    } catch (err) {
      status.textContent = `Fehler bei ${file.name}: ${err.message}`;
      status.className = 'status err';
      return;
    }
  }

  status.textContent = `${success} Datei(en) erfolgreich hochgeladen!`;
  status.className = 'status';
  setTimeout(() => { closeUploadModal(); loadRepo(); }, 1500);
}

// ── Delete-Funktion (GitHub API) ──
async function deleteFile(file) {
  if (!ghToken) { alert('Bitte zuerst einen GitHub Token im Upload-Dialog eingeben.'); return; }
  if (!confirm(`Datei "${file.name}" wirklich löschen?`)) return;
  const branch = document.getElementById('uploadBranch')?.value.trim() || 'main';

  try {
    // SHA holen
    const metaRes = await fetch(`https://api.github.com/repos/${repoOwner}/${repoName}/contents/${file.path}`, {
      headers: { 'Authorization': `token ${ghToken}` }
    });
    if (!metaRes.ok) throw new Error(`HTTP ${metaRes.status}`);
    const meta = await metaRes.json();

    const res = await fetch(`https://api.github.com/repos/${repoOwner}/${repoName}/contents/${file.path}`, {
      method: 'DELETE',
      headers: { 'Authorization': `token ${ghToken}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: `Datei löschen: ${file.name}`, sha: meta.sha, branch: branch })
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    closeModal();
    loadRepo();
  } catch (err) {
    alert('Fehler beim Löschen: ' + err.message);
  }
}

// Upload-Button in Toolbar
const uploadBtn = document.createElement('button');
uploadBtn.textContent = '+ Datei hochladen';
uploadBtn.className = 'upload-btn';
uploadBtn.addEventListener('click', showUploadModal);
document.querySelector('.toolbar').appendChild(uploadBtn);

// ── Init ──
buildSidebar();
content.innerHTML = '<div class="state-msg"><div class="icon">🔗</div><p>Gib oben eine GitHub-Repo-URL ein und klicke «Laden».</p></div>';

// Auto-load
(async () => {
  if (repoInput.value.trim()) {
    try { await loadRepo(); } catch(e) { /* ignore */ }
  }
})();
</script>

</html>
